<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jessica AI Project</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 60rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      line-height: 1.55;
    }
    .banner {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      margin-bottom: 2rem;
    }
    .content { max-width: 38rem; margin: 0 auto; }
    h1 { margin: 0 0 0.25rem; font-size: 1.6rem; }
    p { margin: 0.75em 0; }
    .muted { opacity: 0.65; font-size: 0.95em; }
    .tools { margin: 1.5em 0; padding: 0; list-style: none; }
    .tools li { margin: 0.5em 0; }
    .tools a {
      display: inline-block;
      padding: 0.55em 0.9em;
      border-radius: 6px;
      text-decoration: none;
      background: rgba(0, 229, 255, 0.12);
      border: 1px solid rgba(0, 229, 255, 0.35);
      color: inherit;
      font-weight: 600;
    }
    .tools a:hover { background: rgba(0, 229, 255, 0.22); }
    .tools .lock::before { content: "🔒 "; }
  </style>
</head>
<body>
  <img src="banner.svg" alt="Jessica AI" class="banner">
  <div class="content">
    <h1>Jessica AI Project</h1>
    <p>Support workspace for an LLM-fronted trucking-logistics platform.</p>
    <ul class="tools">
      <li><a class="lock" href="route-planner/">Route planner</a> &mdash;
        gas-price-optimized fueling, with on-route Pilot stations
        color-graded by price (passcode-gated)</li>
    </ul>
    <p class="muted">More material will appear here as the project develops.</p>
  </div>
</body>
</html>
